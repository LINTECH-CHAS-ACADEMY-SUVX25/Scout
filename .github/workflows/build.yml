name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IDF_VERSION: v6.0.1

jobs:
  lint:
    name: cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --inline-suppr \
            scout_cam/main \
            scout_screen/main

  build-cam:
    name: scout_cam (esp32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache ESP-IDF
        uses: actions/cache@v4
        id: cache-idf
        with:
          path: |
            ~/.espressif
            ~/esp-idf
          key: idf-${{ env.IDF_VERSION }}-esp32

      - name: Install ESP-IDF
        if: steps.cache-idf.outputs.cache-hit != 'true'
        run: |
          git clone --branch $IDF_VERSION --depth 1 --recursive https://github.com/espressif/esp-idf.git ~/esp-idf
          ~/esp-idf/install.sh esp32

      - name: Build
        run: |
          . ~/esp-idf/export.sh
          cd scout_cam
          idf.py build

  build-screen:
    name: scout_screen (esp32s3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache ESP-IDF
        uses: actions/cache@v4
        id: cache-idf
        with:
          path: |
            ~/.espressif
            ~/esp-idf
          key: idf-${{ env.IDF_VERSION }}-esp32s3

      - name: Install ESP-IDF
        if: steps.cache-idf.outputs.cache-hit != 'true'
        run: |
          git clone --branch $IDF_VERSION --depth 1 --recursive https://github.com/espressif/esp-idf.git ~/esp-idf
          ~/esp-idf/install.sh esp32s3

      - name: Build
        run: |
          . ~/esp-idf/export.sh
          cd scout_screen
          idf.py build
